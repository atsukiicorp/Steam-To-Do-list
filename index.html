<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=320">
<title>Steam To-Do List</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Barlow+Condensed:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
margin:0;
width:100%;
height:100%;
background:#0e0e10;
}

.widget{
width:100%;
height:100%;
color:white;
font-family:'Barlow Condensed',sans-serif;
}

.badge{
background:#9147ff;
padding:6px;
border-radius:6px;
}

.game-row{
display:flex;
gap:8px;
padding:6px;
border-bottom:1px solid #2a2a35;
}

.game-thumb{
width:80px;
height:37px;
object-fit:cover;
}
</style>
</head>

<body>

<div class="widget">
<div style="display:flex;justify-content:space-between;padding:10px;">
<span>🎮 Backlog</span>
<div class="badge">0</div>
</div>

<div id="gameList">Chargement...</div>
</div>

<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>

<script>
const twitch = window.Twitch.ext;

twitch.onAuthorized(() => {

twitch.configuration.onChanged(() => {

const raw = twitch.configuration.broadcaster?.content;

if (!raw) {
document.getElementById("gameList").innerHTML = "⚠️ Configure l'extension";
return;
}

const { apiKey, steamId } = JSON.parse(raw);

fetch(`https://api.allorigins.win/raw?url=https://api.steampowered.com/IPlayerService/GetOwnedGames/v1/?key=${apiKey}&steamid=${steamId}&include_appinfo=1`)
.then(r => r.json())
.then(data => {

const list = document.getElementById("gameList");

if (!data.response || !data.response.games) {
list.innerHTML = "❌ erreur Steam";
return;
}

const games = data.response.games;

document.querySelector(".badge").textContent = games.length;

list.innerHTML = games.slice(0,50).map(g => `
<div class="game-row">
<img class="game-thumb" src="https://cdn.cloudflare.steamstatic.com/steam/apps/${g.appid}/capsule_231x87.jpg">
<div>
<div>${g.name}</div>
<div>${g.playtime_forever ? Math.round(g.playtime_forever/60)+'h' : 'Jamais joué'}</div>
</div>
</div>
`).join("");

})
.catch(()=>{
document.getElementById("gameList").innerHTML = "❌ erreur API";
});

});

});
</script>

</body>
</html>
