<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=320">
<title>Steam Library – Atsukii Corp</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Barlow+Condensed:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #232329;
  --surface:   #2c2c33;
  --border:    #3a3a44;
  --accent:    #d9534f;
  --accent2:   #e8756f;
  --silver:    #a0a0b0;
  --text:      #e8e8f0;
  --text-dim:  #7a7a8a;
  --font-head: 'Rajdhani', sans-serif;
  --font-body: 'Barlow Condensed', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 320px;
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, #2c2c33 0%, #232329 100%);
}

.logo-mark {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
}

.header-title {
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.08em;
  color: var(--text);
  line-height: 1;
}

.header-sub {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 400;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 2px;
}

.badge-corp {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 0.15em;
  padding: 2px 6px;
  border-radius: 2px;
}

/* ── STATS BAR ── */
.stats-bar {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 6px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--text-dim);
}

.stats-bar .count {
  color: var(--accent);
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 14px;
  margin-right: 4px;
}

.stats-bar .category-tag {
  margin-left: auto;
  background: rgba(217,83,79,0.12);
  border: 1px solid rgba(217,83,79,0.3);
  color: var(--accent2);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 2px;
}

/* ── GAME LIST ── */
#gameList {
  display: flex;
  flex-direction: column;
}

.game-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 12px;
  border-bottom: 1px solid rgba(58,58,68,0.5);
  cursor: default;
  transition: background 0.15s ease;
  animation: fadeSlide 0.25s ease both;
}

.game-item:hover {
  background: rgba(255,255,255,0.03);
}

.game-item:hover .game-name {
  color: var(--accent2);
}

@keyframes fadeSlide {
  from { opacity: 0; transform: translateX(-6px); }
  to   { opacity: 1; transform: translateX(0); }
}

.game-index {
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 10px;
  color: var(--text-dim);
  width: 18px;
  flex-shrink: 0;
  text-align: right;
}

.game-thumb {
  width: 32px;
  height: 15px;
  object-fit: cover;
  border-radius: 2px;
  background: var(--border);
  flex-shrink: 0;
}

.game-thumb-placeholder {
  width: 32px;
  height: 15px;
  background: var(--border);
  border-radius: 2px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.game-name {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 12px;
  color: var(--text);
  letter-spacing: 0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  transition: color 0.15s ease;
}

.game-hours {
  font-family: var(--font-head);
  font-weight: 500;
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
}

/* ── STATUS MESSAGES ── */
.status-msg {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 32px 20px;
  text-align: center;
}

.status-icon {
  font-size: 28px;
  opacity: 0.6;
}

.status-text {
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.06em;
  color: var(--silver);
}

.status-sub {
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.4;
}

/* ── LOADING SHIMMER ── */
.shimmer-wrap {
  padding: 4px 0;
}
.shimmer-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 12px;
  border-bottom: 1px solid rgba(58,58,68,0.5);
}
.shimmer-box {
  height: 10px;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── FOOTER ── */
.footer {
  padding: 6px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-brand {
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
}

.footer-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <!-- Inline SVG du logo A Corp -->
  <svg class="logo-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <polygon points="50,8 85,85 70,85 50,38 30,85 15,85" fill="#a0a0b0"/>
    <rect x="28" y="68" width="44" height="10" fill="#a0a0b0"/>
    <rect x="56" y="44" width="24" height="18" rx="2" fill="#d9534f"/>
    <text x="68" y="57" font-family="Rajdhani,sans-serif" font-weight="700" font-size="11" fill="#fff" text-anchor="middle">CORP</text>
  </svg>
  <div>
    <div class="header-title">STEAM LIBRARY</div>
    <div class="header-sub">Atsukii Corp · Widget</div>
  </div>
  <div class="badge-corp">LIVE</div>
</div>

<!-- STATS BAR (populated by JS) -->
<div class="stats-bar" id="statsBar" style="display:none">
  <span class="count" id="gameCount">0</span>
  <span>jeux</span>
  <span class="category-tag" id="categoryTag">Bibliothèque</span>
</div>

<!-- MAIN CONTENT -->
<div id="gameList">
  <!-- Shimmer loading -->
  <div class="shimmer-wrap" id="shimmerLoad">
    <div class="shimmer-item"><div class="shimmer-box" style="width:18px"></div><div class="shimmer-box" style="width:32px;height:15px"></div><div class="shimmer-box" style="flex:1"></div><div class="shimmer-box" style="width:30px"></div></div>
    <div class="shimmer-item"><div class="shimmer-box" style="width:18px"></div><div class="shimmer-box" style="width:32px;height:15px"></div><div class="shimmer-box" style="flex:1"></div><div class="shimmer-box" style="width:30px"></div></div>
    <div class="shimmer-item"><div class="shimmer-box" style="width:18px"></div><div class="shimmer-box" style="width:32px;height:15px"></div><div class="shimmer-box" style="flex:1"></div><div class="shimmer-box" style="width:30px"></div></div>
    <div class="shimmer-item"><div class="shimmer-box" style="width:18px"></div><div class="shimmer-box" style="width:32px;height:15px"></div><div class="shimmer-box" style="flex:1"></div><div class="shimmer-box" style="width:30px"></div></div>
    <div class="shimmer-item"><div class="shimmer-box" style="width:18px"></div><div class="shimmer-box" style="width:32px;height:15px"></div><div class="shimmer-box" style="flex:1"></div><div class="shimmer-box" style="width:30px"></div></div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <span class="footer-brand">Atsukii Corp</span>
  <div class="footer-dot"></div>
  <span class="footer-brand">Steam Widget</span>
</div>

<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>

<script>
const twitch = window.Twitch.ext;

function formatHours(minutes) {
  if (!minutes) return '';
  const h = Math.round(minutes / 60);
  if (h < 1) return '<1h';
  return h + 'h';
}

function showError(icon, title, sub) {
  document.getElementById('shimmerLoad')?.remove();
  document.getElementById('gameList').innerHTML = `
    <div class="status-msg">
      <div class="status-icon">${icon}</div>
      <div class="status-text">${title}</div>
      <div class="status-sub">${sub}</div>
    </div>`;
}

function load(configRaw) {
  if (!configRaw) {
    showError('⚙️', 'Configuration requise', 'Configure l\'extension via le dashboard Twitch.');
    return;
  }

  let config;
  try { config = JSON.parse(configRaw); } catch (e) {
    showError('❌', 'Config invalide', 'Erreur de lecture de la configuration.');
    return;
  }

  const { apiKey, steamId, category } = config;

  const steamUrl = `https://api.steampowered.com/IPlayerService/GetOwnedGames/v1/?key=${apiKey}&steamid=${steamId}&include_appinfo=1`;
  const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(steamUrl)}`;

  fetch(proxyUrl)
    .then(r => r.json())
    .then(data => {
      const list = document.getElementById('gameList');
      document.getElementById('shimmerLoad')?.remove();

      if (!data.response || !data.response.games) {
        showError('🎮', 'Aucun jeu trouvé', 'Vérifie ta clé API et ton Steam ID.');
        return;
      }

      let games = data.response.games;

      // Filter by category keyword if provided
      if (category && category.trim() !== '') {
        const kw = category.trim().toLowerCase();
        games = games.filter(g => g.name && g.name.toLowerCase().includes(kw));
      }

      // Sort by playtime desc
      games.sort((a, b) => (b.playtime_forever || 0) - (a.playtime_forever || 0));
      games = games.slice(0, 50);

      // Update stats bar
      const statsBar = document.getElementById('statsBar');
      document.getElementById('gameCount').textContent = games.length;
      if (category && category.trim()) {
        document.getElementById('categoryTag').textContent = category.trim();
      } else {
        document.getElementById('categoryTag').textContent = 'Bibliothèque';
      }
      statsBar.style.display = 'flex';

      if (games.length === 0) {
        showError('🔍', 'Aucun résultat', `Aucun jeu trouvé pour « ${category} ».`);
        return;
      }

      list.innerHTML = games.map((g, i) => {
        const thumb = g.img_logo_url
          ? `<img class="game-thumb" src="https://media.steampowered.com/steamcommunity/public/images/apps/${g.appid}/${g.img_logo_url}.jpg" alt="" onerror="this.style.display='none'">`
          : `<div class="game-thumb-placeholder"></div>`;

        const hrs = formatHours(g.playtime_forever);

        return `
          <div class="game-item" style="animation-delay:${Math.min(i * 0.03, 0.8)}s">
            <span class="game-index">${i + 1}</span>
            ${thumb}
            <span class="game-name" title="${g.name}">${g.name}</span>
            ${hrs ? `<span class="game-hours">${hrs}</span>` : ''}
          </div>`;
      }).join('');
    })
    .catch(() => {
      showError('🌐', 'Erreur réseau', 'Impossible de joindre l\'API Steam.');
    });
}

// onChanged doit être enregistré AVANT onAuthorized
twitch.configuration.onChanged(() => {
  const cfg = twitch.configuration.broadcaster;
  console.log('[ATSUKII] onChanged fired — broadcaster:', cfg);
  const raw = cfg && cfg.content ? cfg.content : null;
  console.log('[ATSUKII] raw content:', raw);
  load(raw);
});

twitch.onAuthorized(function(auth) {
  console.log('[ATSUKII] onAuthorized fired — auth:', auth);
  const cfg = twitch.configuration.broadcaster;
  console.log('[ATSUKII] broadcaster at auth time:', cfg);
  const raw = cfg && cfg.content ? cfg.content : null;
  load(raw);
});
</script>

</body>
</html>
