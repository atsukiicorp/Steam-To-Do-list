<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=320">
<title>Steam To-Do List</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Barlow+Condensed:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
margin:0;
width:100%;
height:100%;
}

body {
background:#232329;
display:flex;
justify-content:center;
align-items:flex-start;
font-family:sans-serif;
}

/* TON DESIGN CONSERVÉ */
.widget {
width:320px;
max-width:100%;
height:100%;
}
</style>
</head>

<body>

<div class="widget">
<div id="gameList">Chargement...</div>
</div>

<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>

<script>
const twitch = window.Twitch.ext;

function load(configRaw){
if(!configRaw){
document.getElementById("gameList").innerHTML="⚠️ Configure l'extension";
return;
}

let config;
try{config=JSON.parse(configRaw);}catch(e){
document.getElementById("gameList").innerHTML="❌ config invalide";
return;
}

const {apiKey,steamId}=config;

fetch(`https://api.allorigins.win/raw?url=https://api.steampowered.com/IPlayerService/GetOwnedGames/v1/?key=${apiKey}&steamid=${steamId}&include_appinfo=1`)
.then(r=>r.json())
.then(data=>{
const list=document.getElementById("gameList");

if(!data.response||!data.response.games){
list.innerHTML="❌ erreur Steam";
return;
}

list.innerHTML=data.response.games.slice(0,50).map(g=>`
<div>
${g.name}
</div>
`).join("");

});
}

twitch.onAuthorized(()=>{
const raw=twitch.configuration.broadcaster?.content;
load(raw);

twitch.configuration.onChanged(()=>{
const raw=twitch.configuration.broadcaster?.content;
load(raw);
});
});
</script>

</body>
</html>
