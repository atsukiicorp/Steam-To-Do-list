<!DOCTYPE html>
<html>
<head>
<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
</head>
<body>

<input id="api" placeholder="API KEY"><br>
<input id="id" placeholder="STEAM ID"><br>
<button onclick="save()">SAVE</button>

<script>
const twitch = window.Twitch.ext;

function save(){
const data={
apiKey:document.getElementById("api").value,
steamId:document.getElementById("id").value
};

twitch.configuration.set("broadcaster","1",JSON.stringify(data));
alert("OK");
}
</script>

</body>
</html>
